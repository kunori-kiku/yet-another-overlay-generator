name: WASM cross-engine soak

# The framework-refactor plan-4 multi-browser soak (webkit + firefox) that gated deleting the ~10.6K-LOC
# hand-mirrored TS compiler twin (plan-5). It runs the in-browser Go/WASM design flow
# (frontend/e2e/wasm-design.spec.ts) on the two NON-Chromium engines — webkit ≈ the Safari engine,
# exactly the cross-engine WASM risk ci.yml's Chromium perpetual guard cannot catch.
#
# The soak projects exist ONLY under YAOG_WASM_SOAK=1 (see frontend/playwright.config.ts), so ci.yml's
# Chromium-only install stays safe; here we install webkit+firefox explicitly and set the flag. This is
# scheduled + manual — NON-BLOCKING for PRs (a WASM regression that reaches only webkit/firefox surfaces
# on the weekly run or a manual dispatch, not as a per-PR gate). Before plan-2 this soak was orphaned
# config that nothing ran; this workflow makes it real.
on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1' # Mondays 06:17 UTC

permissions:
  contents: read

jobs:
  wasm-soak:
    name: WASM soak (webkit + firefox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # The Playwright globalSetup boots cmd/e2eserver from .e2e-bin/ (repo root) — build them here,
      # exactly as ci.yml's frontend-e2e job does (prebuilt, not `go run`, for offline determinism).
      - name: Build E2E bring-up binaries
        run: |
          mkdir -p .e2e-bin
          go build -o .e2e-bin/e2eserver ./cmd/e2eserver
          go build -o .e2e-bin/e2eagent ./cmd/e2eagent
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      # Build + stamp the WASM engine into dist (the soak's whole point is to run yaog.wasm in-browser).
      - name: Build WASM local engine
        working-directory: frontend
        run: npm run build:wasm
      - name: Build panel
        working-directory: frontend
        run: VITE_E2E=1 npm run build
      - name: Install Playwright webkit + firefox
        working-directory: frontend
        run: npx playwright install --with-deps webkit firefox
      # YAOG_WASM_SOAK=1 makes the webkit + firefox projects exist; they run ONLY wasm-design.spec.ts.
      - name: Run WASM cross-engine soak
        working-directory: frontend
        env:
          YAOG_WASM_SOAK: '1'
        run: npm run test:e2e -- --project=webkit --project=firefox
