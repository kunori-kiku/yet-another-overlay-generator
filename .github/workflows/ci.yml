name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  go:
    name: Go fmt + vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Format check
        run: |
          drift="$(gofmt -l ./cmd ./internal)"
          if [ -n "$drift" ]; then
            echo "::error::gofmt drift — run 'gofmt -w ./cmd ./internal':"
            echo "$drift"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      # The air-gap compute routes/handlers live behind //go:build airgap (plan-7): the default
      # `go test ./...` above does NOT compile or exercise them, so also build+vet+test the
      # `-tags airgap` profile to keep the retained local-design oracle (the plan-13/21 boot
      # target) from silently rotting.
      - name: Vet (airgap profile)
        run: go vet -tags airgap ./...
      - name: Test (airgap profile)
        run: go test -tags airgap ./...

  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  conformance:
    name: Go↔TS conformance + coverage floor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # (a) Go oracle + golden + drift + KAT + the cross-package codes-catalog sync.
      #     A plain `go test` (NOT -update) asserts every golden/drift snapshot against the
      #     committed frozen oracle. TestCoverageFloor is excluded here (it has its own step,
      #     below) so a coverage drop is reported distinctly from a golden/drift divergence.
      - name: Go oracle + golden + drift + KAT + catalog-sync
        run: |
          go test ./internal/conformance/ \
            -run 'TestGolden|TestGoldenFail|TestGoldenFail_SpansBothChannels|TestGolden_Deterministic|TestConformanceComparator_SelfCompare|TestDrift|TestKeygenKAT'
          go test ./internal/ -run TestI18nCatalogSync
          go test ./internal/ -run TestI18nCatalogParity
      # (b) Per-package coverage FLOOR over the local-compile pipeline packages. The frozen
      #     floors live in internal/conformance/coverage_floor.json; TestCoverageFloor shells
      #     out to `go test -coverprofile` per package and reds if any drops below its floor.
      #     Re-baseline by editing that JSON (see docs/spec/compiler/conformance-manifest-schema.md).
      #     It is gated to this job via YAOG_CONFORMANCE_COVERAGE_FLOOR so the main `go` job's
      #     `go test ./...` does not re-run every pipeline suite nested inside it.
      - name: Per-package coverage floor
        run: go test ./internal/conformance/ -run TestCoverageFloor -v
        env:
          YAOG_CONFORMANCE_COVERAGE_FLOOR: "1"
      # (c) The vitest heal pin: the TS healCollidingPins (frontend/src/lib/normalizeEdges.ts)
      #     must byte-equal the Go normalize.HealCollidingPins over the shared corpus. A
      #     deliberate divergence of the TS linkKey/pinKey reds this step.
      - name: Frontend conformance (vitest heal pin)
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps
          npm run conformance

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # Build the TEST-ONLY bring-up binaries PREBUILT (not `go run` — offline-module
      # determinism). cmd/e2eserver MUST be -tags airgap: the air-gap boot's /api/compile
      # lives behind //go:build airgap (plan-7). They land in .e2e-bin/ — the default path
      # the Playwright globalSetup resolves (no env override needed).
      - name: Build E2E bring-up binaries
        run: |
          mkdir -p .e2e-bin
          go build -tags airgap -o .e2e-bin/e2eserver ./cmd/e2eserver
          go build -o .e2e-bin/e2eagent ./cmd/e2eagent
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      # Build the panel the boots serve from (EnableStatic). globalSetup resolves dist at
      # frontend/dist by default. VITE_E2E=1 compiles in the test-only ErrorBoundary render-throw
      # probe (App.tsx) for the adversarial error-render spec; it is dead-code-eliminated from the
      # release/Docker builds, which never set this flag, so production bundles are unaffected.
      - name: Build panel
        working-directory: frontend
        run: VITE_E2E=1 npm run build
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      # Required: functional/adversarial (chromium) + the deterministic responsive BEHAVIOR matrix
      # (desktop/phone/tablet). Excludes the pixel snapshots ("visual corpus") — those are a separate
      # non-blocking step until their baselines are CI-stable (plan-17 / 3.5).
      - name: Run E2E canaries
        working-directory: frontend
        run: npm run test:e2e -- --grep-invert "visual corpus"
      # Non-blocking visual-regression gate (plan-17 / 3.5): runs the toHaveScreenshot corpus on
      # desktop+phone against the committed Linux baselines. continue-on-error keeps it OFF the
      # required path until the baselines pass a determinism run in CI and the gate is promoted to
      # required (see e2e/README.md — regenerate with --update-snapshots + PR-review the diff).
      - name: Visual-regression corpus (non-blocking until baselines CI-stable)
        id: visual
        continue-on-error: true
        working-directory: frontend
        run: npx playwright test e2e/responsive/snapshots.spec.ts --project=desktop --project=phone
      # Report + traces for a failed run (trace: retain-on-failure). Collected on a real failure OR a
      # visual diff (the continue-on-error visual step does not fail the job, so check its outcome) so
      # a flake / diff is diagnosable from the CI artifact, never re-run blind.
      - name: Upload Playwright report
        if: failure() || steps.visual.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  # The MANDATORY rc.1-gating real-tunnel tier (plan-18 / 3.6): bring up the configs cmd/compiler
  # actually generates (per-peer WireGuard + babeld + the unmodified install.sh) inside per-node
  # systemd-nspawn containers on this one runner, then assert the overlay works on the kernel —
  # handshake, babel route convergence, overlay ping (0% loss), and the SNAT transit->overlay
  # rewrite. Test-only under //go:build linux && integration (invisible to every other job's build).
  realtunnel:
    name: Real-tunnel netns integration (rc.1 gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Prepare real-tunnel tier
        id: rt
        uses: ./.github/actions/realtunnel-setup
      # REQUIRED: the simple-mesh canary (+ nspawn lifecycle + the no-root template-shape pin). The
      # additive scenarios and the negative proof SKIP here (their env selectors are unset), so this
      # step is exactly the rc.1-gating floor. Run as root from the prebuilt binary; tee for the log.
      - name: Real-tunnel canary (REQUIRED)
        run: |
          set -o pipefail
          sudo REALTUNNEL_ROOTFS=${{ steps.rt.outputs.rootfs }} ${{ steps.rt.outputs.testbin }} \
            -test.v -test.timeout 600s 2>&1 | tee /tmp/realtunnel-ci.log
          # Positive run-assertion: a skipped canary exits 0 (skip==pass), which would let the
          # required gate pass vacuously if a prerequisite (root / WG module / rootfs) ever went
          # missing. Require the canary to have actually PASSED, and fail loud if it SKIPPED.
          grep -q '^--- PASS: TestSimpleMeshCanary' /tmp/realtunnel-ci.log \
            || { echo "::error::TestSimpleMeshCanary did not PASS (skipped or absent) — the required realtunnel gate must not pass vacuously"; exit 1; }
          ! grep -q '^--- SKIP: TestSimpleMeshCanary' /tmp/realtunnel-ci.log \
            || { echo "::error::TestSimpleMeshCanary SKIPPED — a prerequisite is missing on the runner"; exit 1; }
      # Non-blocking opt-in tier (plan-18 Phase 7): the C3 reverse-endpoint contract, relay transit,
      # and router hub-and-spoke. continue-on-error keeps them OFF the required path (the canary is
      # the floor) while still exercising them every PR so a break is caught early.
      - name: Additive scenarios (non-blocking)
        id: additive
        continue-on-error: true
        run: |
          set -o pipefail
          sudo REALTUNNEL_ROOTFS=${{ steps.rt.outputs.rootfs }} REALTUNNEL_SCENARIOS=all ${{ steps.rt.outputs.testbin }} \
            -test.v -test.timeout 900s -test.run 'TestC3OneDirectional|TestRelayTopology|TestNatHub' \
            2>&1 | tee /tmp/realtunnel-additive.log
      - name: Upload realtunnel logs
        if: failure() || steps.additive.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: realtunnel-logs
          path: |
            /tmp/realtunnel-ci.log
            /tmp/realtunnel-additive.log
          retention-days: 7
