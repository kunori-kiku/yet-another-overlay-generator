name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Release gate: a tag must never ship untested code. Normally the tagged commit
  # already passed PR CI on main, but tags can point anywhere — re-verify here
  # before any bundle is built. A true step-by-step mirror of ci.yml's gate
  # BEHAVIOR (plan-22 / 4.3): gofmt-drift + go test -race, npm run build (tsc -b),
  # the required frontend-e2e Playwright job, and
  # the realtunnel netns gate (gate-realtunnel). (setup-go here adds check-latest;
  # the resolved toolchain is identical — go.mod pins toolchain go1.26.5.)
  gate-go:
    name: Gate — Go vet + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      # Step-by-step mirror of ci.yml's `go` gate behavior (plan-22 / 4.3 Task 3): gofmt-drift +
      # vet + `go test -race`. Previously gate-go omitted gofmt + -race, so a tag could ship code
      # that would have failed PR CI.
      - name: Format check
        run: |
          drift="$(gofmt -l ./cmd ./internal)"
          if [ -n "$drift" ]; then
            echo "::error::gofmt drift — run 'gofmt -w ./cmd ./internal':"
            echo "$drift"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  gate-frontend:
    name: Gate — Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      # Mirror ci.yml's `frontend` job (plan-22 / 4.3 Task 3): run the build (tsc -b, the stricter
      # project-references typecheck) HERE so a tsc-b failure reds the gate, not deep in build-frontend.
      - name: Build
        run: npm run build

  # Mirror ci.yml's required frontend-e2e job: a tag must not ship a panel that would have
  # failed the full-stack Playwright suite on PR CI (tests_ci.recommendations[2]).
  gate-e2e:
    name: Gate — Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build E2E bring-up binaries
        run: |
          mkdir -p .e2e-bin
          go build -o .e2e-bin/e2eserver ./cmd/e2eserver
          go build -o .e2e-bin/e2eagent ./cmd/e2eagent
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      # VITE_E2E=1 (matching ci.yml's frontend-e2e Build panel) compiles in the test-only
      # ErrorBoundary render-throw probe (App.tsx, gated on import.meta.env.VITE_E2E, else DCE'd).
      # The REQUIRED adversarial spec e2e/adversarial/error-render.spec.ts drives it, so without this
      # flag that spec deterministically times out — the gate must build the panel the same way CI does.
      - name: Build panel
        working-directory: frontend
        run: VITE_E2E=1 npm run build
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      # Mirror ci.yml's REQUIRED frontend-e2e step exactly: the functional/adversarial suite + the
      # deterministic responsive BEHAVIOR matrix, EXCLUDING the pixel "visual corpus". The visual
      # snapshots are a deliberately NON-blocking, not-yet-CI-stable gate (ci.yml runs them as a
      # separate continue-on-error step; e2e/README.md §visual-regression). Gating a release tag on
      # them would block on a check the project does not treat as required, so this step must use the
      # same --grep-invert as the required CI step, not the full `npm run test:e2e`.
      - name: Run E2E suite (required set — excludes the non-blocking visual corpus)
        working-directory: frontend
        run: npm run test:e2e -- --grep-invert "visual corpus"
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  # Mirror ci.yml's `realtunnel` job: a tag must not ship code that would have failed the rc.1-gating
  # real-tunnel canary on PR CI. Brings up the simple-mesh bundle in per-node systemd-nspawn
  # containers and asserts the kernel overlay works (handshake/route/ping/SNAT). The additive
  # scenarios + negative proof are NOT part of the release gate (they are non-required / on-demand);
  # the 20x bake-in is the separate realtunnel-bakein workflow run as the rc.1 precondition.
  gate-realtunnel:
    name: Gate — Real-tunnel netns integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Prepare real-tunnel tier
        id: rt
        uses: ./.github/actions/realtunnel-setup
      - name: Real-tunnel canary (REQUIRED)
        run: |
          set -o pipefail
          sudo REALTUNNEL_ROOTFS=${{ steps.rt.outputs.rootfs }} ${{ steps.rt.outputs.testbin }} \
            -test.v -test.timeout 600s 2>&1 | tee /tmp/realtunnel-release.log
          # Positive run-assertion: a skipped canary exits 0, which must not let the release gate pass
          # vacuously — require the canary to have actually PASSED, and fail loud if it SKIPPED.
          grep -q '^--- PASS: TestSimpleMeshCanary' /tmp/realtunnel-release.log \
            || { echo "::error::TestSimpleMeshCanary did not PASS (skipped or absent) — release gate must not pass vacuously"; exit 1; }
          ! grep -q '^--- SKIP: TestSimpleMeshCanary' /tmp/realtunnel-release.log \
            || { echo "::error::TestSimpleMeshCanary SKIPPED — a prerequisite is missing on the runner"; exit 1; }
      - name: Upload realtunnel logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: realtunnel-release-logs
          path: /tmp/realtunnel-release.log
          retention-days: 7

  build-frontend:
    name: Build Frontend Dist
    needs: [gate-go, gate-frontend, gate-e2e, gate-realtunnel]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Go is REQUIRED here: the in-browser local engine (framework-refactor plan-4 made Go/WASM the
      # default+only local engine) is compiled by npm run build:wasm below. Resolve the go.mod toolchain
      # (go1.26.5) via check-latest; do NOT pin GOTOOLCHAIN=local (that could ship a wasm built by an
      # older toolchain against the committed 1.26.5 web/wasm_exec.js).
      - name: Setup Go (WASM local engine)
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci --legacy-peer-deps
          # The in-browser Go/WASM local engine: build:wasm compiles web/yaog.wasm + refreshes
          # web/wasm_exec.js from the toolchain and copies BOTH into frontend/public/, so the vite
          # builds below stamp them into dist/ + dist-local/. Without this, every shipped panel 404s
          # on /yaog.wasm and in-browser local design is dead-on-arrival (CI's e2e job builds the wasm
          # separately, so the gap was invisible until now).
          npm run build:wasm
          # The all-in-one controller panel (default build → frontend/dist), shipped inside
          # every platform bundle + the controller image.
          npm run build
          # The static-local-design SPA (VITE_LOCAL_ONLY → frontend/dist-local, plan-7 / 1.7):
          # mode locked to local, controller affordances hidden, no backend dependency — packaged
          # as a SEPARATE standalone release asset (yaog-local-design-<version>.zip) below.
          npm run build:local
          # SHIP GATE (plan-2): a build-frontend regression that drops the WASM engine must FAIL the
          # release here, not 404 at runtime on the fleet. BOTH shipped panels must carry it.
          test -f dist/yaog.wasm && test -f dist/wasm_exec.js
          test -f dist-local/yaog.wasm && test -f dist-local/wasm_exec.js

      - name: Upload Frontend Dist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

      - name: Upload Static-Local-Design Dist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-local
          path: frontend/dist-local
          if-no-files-found: error

  build-bundles:
    name: Build ${{ matrix.target.id }} Bundle
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: linux-amd64
            goos: linux
            goarch: amd64
            goarm: ''
            archive: tar.gz
            exe_ext: ''
          - id: linux-arm64
            goos: linux
            goarch: arm64
            goarm: ''
            archive: tar.gz
            exe_ext: ''
          - id: linux-386
            goos: linux
            goarch: 386
            goarm: ''
            archive: tar.gz
            exe_ext: ''
          - id: linux-armv7
            goos: linux
            goarch: arm
            goarm: '7'
            archive: tar.gz
            exe_ext: ''
          - id: windows-amd64
            goos: windows
            goarch: amd64
            goarm: ''
            archive: zip
            exe_ext: .exe
          - id: windows-arm64
            goos: windows
            goarch: arm64
            goarm: ''
            archive: zip
            exe_ext: .exe
          - id: windows-386
            goos: windows
            goarch: 386
            goarm: ''
            archive: zip
            exe_ext: .exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Download Frontend Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: .tmp/frontend-dist

      - name: Build Backend Binaries
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          GOARM: ${{ matrix.target.goarm }}
          CGO_ENABLED: 0
          # The release tag (e.g. v2.0.0-beta.1) injected via -X main.BuildVersion so each binary's
          # `version` subcommand + the agent's per-node report carry the real tag. Passed via env
          # (not inline ${{ }}) to keep the tag out of the shell-parse path.
          BUILD_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"

          if [ ! -f go.mod ]; then
            echo "go.mod not found in workspace root, searching for module root..."
            MOD_FILE="$(find . -maxdepth 4 -name go.mod | head -n1)"
            if [ -z "$MOD_FILE" ]; then
              echo "ERROR: go.mod not found in checkout" >&2
              ls -la
              exit 1
            fi
            cd "$(dirname "$MOD_FILE")"
          fi

          echo "Using module: $(go env GOMOD)"

          mkdir -p "$GITHUB_WORKSPACE/.tmp/bin"
          # EXTEND the existing "-s -w" ldflags with the build-version stamp; do not replace it.
          LDFLAGS="-s -w -X main.BuildVersion=${BUILD_VERSION}"
          # The controller server — the single server build (framework-refactor plan-9 retired
          # the -tags airgap variant). It is the PRIMARY server artifact shipped in the bundle +
          # the controller image; it links no anonymous compute routes.
          go build -trimpath -ldflags "$LDFLAGS" -o "$GITHUB_WORKSPACE/.tmp/bin/yaog-server${{ matrix.target.exe_ext }}" ./cmd/server
          go build -trimpath -ldflags "$LDFLAGS" -o "$GITHUB_WORKSPACE/.tmp/bin/yaog-compiler${{ matrix.target.exe_ext }}" ./cmd/compiler
          # yaog-agent is the node-side binary the one-shot bootstrap downloads (plan-5.2).
          go build -trimpath -ldflags "$LDFLAGS" -o "$GITHUB_WORKSPACE/.tmp/bin/yaog-agent${{ matrix.target.exe_ext }}" ./cmd/agent

      - name: Assemble Bundle Directory
        run: |
          set -euo pipefail
          mkdir -p .tmp/bundle/bin .tmp/bundle/frontend
          # Ship the controller server + compiler + agent in the bundle.
          find .tmp/bin -maxdepth 1 -type f -exec cp {} .tmp/bundle/bin/ \;
          cp -R .tmp/frontend-dist/. .tmp/bundle/frontend/

      - name: Create Bundle Archive
        run: |
          if [ "${{ matrix.target.archive }}" = "tar.gz" ]; then
            tar -czf "yaog-bundle-${{ matrix.target.id }}.tar.gz" -C .tmp/bundle .
          else
            (cd .tmp/bundle && zip -r "$GITHUB_WORKSPACE/yaog-bundle-${{ matrix.target.id }}.zip" .)
          fi

      - name: Upload Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaog-bundle-${{ matrix.target.id }}
          path: yaog-bundle-${{ matrix.target.id }}.${{ matrix.target.archive }}
          if-no-files-found: error

      # Publish the agent as a STANDALONE per-arch binary too, so the one-shot
      # bootstrap (plan-5.2) can download just the node binary (curl + chmod +x)
      # rather than the whole bundle.
      - name: Stage Standalone Agent Binary + SHA-256
        run: |
          set -euo pipefail
          AGENT="yaog-agent-${{ matrix.target.id }}${{ matrix.target.exe_ext }}"
          cp ".tmp/bin/yaog-agent${{ matrix.target.exe_ext }}" "$AGENT"
          # D9: emit a SHA-256 sidecar so beta.2's signed artifacts.json agent pin (AgentBinSHA256)
          # is populatable from the published release. NOTE: the agent ALWAYS verifies a self-update
          # against the SIGNED in-bundle artifacts.json pin, NEVER this sidecar (which rides the same
          # untrusted transport as the binary) — this file is an operator convenience for FILLING the
          # pin, not itself a trust anchor.
          sha256sum "$AGENT" | awk '{print $1}' > "$AGENT.sha256"

      - name: Upload Standalone Agent Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaog-agent-${{ matrix.target.id }}
          path: |
            yaog-agent-${{ matrix.target.id }}${{ matrix.target.exe_ext }}
            yaog-agent-${{ matrix.target.id }}${{ matrix.target.exe_ext }}.sha256
          if-no-files-found: error

  # Package the static-local-design SPA (VITE_LOCAL_ONLY build) into a single standalone,
  # backend-free archive operators can host on any static web server (plan-7 / 1.7). Separate
  # from the platform bundles: it has no binaries, no controller backend, one cross-platform zip.
  package-local-design:
    name: Package Static-Local-Design Site
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Download Static-Local-Design Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-local
          path: .tmp/dist-local

      - name: Create Static-Local-Design Archive
        run: |
          set -euo pipefail
          # github.ref_name is the tag (e.g. v2.0.0-beta.9). Name the asset by version so it is
          # self-describing alongside the platform bundles.
          (cd .tmp/dist-local && zip -r "$GITHUB_WORKSPACE/yaog-local-design-${{ github.ref_name }}.zip" .)

      - name: Upload Static-Local-Design Archive Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaog-local-design
          path: yaog-local-design-${{ github.ref_name }}.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-bundles, package-local-design]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Release Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: yaog-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # Deterministically promote rc.N and final vX.Y.Z to GitHub "Latest" while keeping
          # -beta./-preview. tags OFF Latest, independent of operator timing (plan-22 / 4.3 Task 4b;
          # closes the "Latest left to GitHub's newest-non-prerelease heuristic" defect). This encodes
          # the EXPLICIT 2026-06-18 owner override of RELEASING.md's prerelease/not-latest default:
          # rc.1 ships as Latest, beta.8 demoted. (The runbook's pre-create --latest is the suspenders.)
          make_latest: ${{ !contains(github.ref_name, '-beta.') && !contains(github.ref_name, '-preview.') }}
          files: |
            yaog-bundle-*.tar.gz
            yaog-bundle-*.zip
            yaog-agent-linux-*
            yaog-agent-windows-*
            yaog-local-design-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}