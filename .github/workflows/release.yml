name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Release gate: a tag must never ship untested code. Normally the tagged commit
  # already passed PR CI on main, but tags can point anywhere — re-verify here
  # before any bundle is built. Mirrors ci.yml's two jobs.
  gate-go:
    name: Gate — Go vet + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  gate-frontend:
    name: Gate — Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

  build-frontend:
    name: Build Frontend Dist
    needs: [gate-go, gate-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Upload Frontend Dist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  build-bundles:
    name: Build ${{ matrix.target.id }} Bundle
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: linux-amd64
            goos: linux
            goarch: amd64
            goarm: ''
            archive: tar.gz
            exe_ext: ''
          - id: linux-arm64
            goos: linux
            goarch: arm64
            goarm: ''
            archive: tar.gz
            exe_ext: ''
          - id: linux-386
            goos: linux
            goarch: 386
            goarm: ''
            archive: tar.gz
            exe_ext: ''
          - id: linux-armv7
            goos: linux
            goarch: arm
            goarm: '7'
            archive: tar.gz
            exe_ext: ''
          - id: windows-amd64
            goos: windows
            goarch: amd64
            goarm: ''
            archive: zip
            exe_ext: .exe
          - id: windows-arm64
            goos: windows
            goarch: arm64
            goarm: ''
            archive: zip
            exe_ext: .exe
          - id: windows-386
            goos: windows
            goarch: 386
            goarm: ''
            archive: zip
            exe_ext: .exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Download Frontend Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: .tmp/frontend-dist

      - name: Build Backend Binaries
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          GOARM: ${{ matrix.target.goarm }}
          CGO_ENABLED: 0
          # The release tag (e.g. v2.0.0-beta.1) injected via -X main.BuildVersion so each binary's
          # `version` subcommand + the agent's per-node report carry the real tag. Passed via env
          # (not inline ${{ }}) to keep the tag out of the shell-parse path.
          BUILD_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"

          if [ ! -f go.mod ]; then
            echo "go.mod not found in workspace root, searching for module root..."
            MOD_FILE="$(find . -maxdepth 4 -name go.mod | head -n1)"
            if [ -z "$MOD_FILE" ]; then
              echo "ERROR: go.mod not found in checkout" >&2
              ls -la
              exit 1
            fi
            cd "$(dirname "$MOD_FILE")"
          fi

          echo "Using module: $(go env GOMOD)"

          mkdir -p "$GITHUB_WORKSPACE/.tmp/bin"
          # EXTEND the existing "-s -w" ldflags with the build-version stamp; do not replace it.
          LDFLAGS="-s -w -X main.BuildVersion=${BUILD_VERSION}"
          go build -trimpath -ldflags "$LDFLAGS" -o "$GITHUB_WORKSPACE/.tmp/bin/yaog-server${{ matrix.target.exe_ext }}" ./cmd/server
          go build -trimpath -ldflags "$LDFLAGS" -o "$GITHUB_WORKSPACE/.tmp/bin/yaog-compiler${{ matrix.target.exe_ext }}" ./cmd/compiler
          # yaog-agent is the node-side binary the one-shot bootstrap downloads (plan-5.2).
          go build -trimpath -ldflags "$LDFLAGS" -o "$GITHUB_WORKSPACE/.tmp/bin/yaog-agent${{ matrix.target.exe_ext }}" ./cmd/agent

      - name: Assemble Bundle Directory
        run: |
          mkdir -p .tmp/bundle/bin .tmp/bundle/frontend
          cp .tmp/bin/* .tmp/bundle/bin/
          cp -R .tmp/frontend-dist/. .tmp/bundle/frontend/

      - name: Create Bundle Archive
        run: |
          if [ "${{ matrix.target.archive }}" = "tar.gz" ]; then
            tar -czf "yaog-bundle-${{ matrix.target.id }}.tar.gz" -C .tmp/bundle .
          else
            (cd .tmp/bundle && zip -r "$GITHUB_WORKSPACE/yaog-bundle-${{ matrix.target.id }}.zip" .)
          fi

      - name: Upload Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaog-bundle-${{ matrix.target.id }}
          path: yaog-bundle-${{ matrix.target.id }}.${{ matrix.target.archive }}
          if-no-files-found: error

      # Publish the agent as a STANDALONE per-arch binary too, so the one-shot
      # bootstrap (plan-5.2) can download just the node binary (curl + chmod +x)
      # rather than the whole bundle.
      - name: Stage Standalone Agent Binary + SHA-256
        run: |
          set -euo pipefail
          AGENT="yaog-agent-${{ matrix.target.id }}${{ matrix.target.exe_ext }}"
          cp ".tmp/bin/yaog-agent${{ matrix.target.exe_ext }}" "$AGENT"
          # D9: emit a SHA-256 sidecar so beta.2's signed artifacts.json agent pin (AgentBinSHA256)
          # is populatable from the published release. NOTE: the agent ALWAYS verifies a self-update
          # against the SIGNED in-bundle artifacts.json pin, NEVER this sidecar (which rides the same
          # untrusted transport as the binary) — this file is an operator convenience for FILLING the
          # pin, not itself a trust anchor.
          sha256sum "$AGENT" | awk '{print $1}' > "$AGENT.sha256"

      - name: Upload Standalone Agent Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaog-agent-${{ matrix.target.id }}
          path: |
            yaog-agent-${{ matrix.target.id }}${{ matrix.target.exe_ext }}
            yaog-agent-${{ matrix.target.id }}${{ matrix.target.exe_ext }}.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build-bundles
    runs-on: ubuntu-latest
    steps:
      - name: Download All Release Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: yaog-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            yaog-bundle-*.tar.gz
            yaog-bundle-*.zip
            yaog-agent-linux-*
            yaog-agent-windows-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}