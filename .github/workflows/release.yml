name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Release gate: a tag must never ship untested code. Normally the tagged commit
  # already passed PR CI on main, but tags can point anywhere — re-verify here
  # before any bundle is built. Mirrors ci.yml's gates (incl. the //go:build airgap
  # profile and the required frontend-e2e Playwright job).
  gate-go:
    name: Gate — Go vet + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      # Mirror ci.yml: also exercise the -tags airgap profile (the air-gap compute routes /
      # local-design oracle live behind //go:build airgap and are not compiled by the default
      # build above).
      - name: Vet (airgap profile)
        run: go vet -tags airgap ./...

      - name: Test (airgap profile)
        run: go test -tags airgap ./...

  gate-frontend:
    name: Gate — Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

  # Mirror ci.yml's required frontend-e2e job: a tag must not ship a panel that would have
  # failed the full-stack Playwright suite on PR CI (tests_ci.recommendations[2]).
  gate-e2e:
    name: Gate — Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build E2E bring-up binaries
        run: |
          mkdir -p .e2e-bin
          go build -tags airgap -o .e2e-bin/e2eserver ./cmd/e2eserver
          go build -o .e2e-bin/e2eagent ./cmd/e2eagent
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      - name: Build panel
        working-directory: frontend
        run: npm run build
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E suite
        working-directory: frontend
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  # Mirror ci.yml's `realtunnel` job: a tag must not ship code that would have failed the rc.1-gating
  # real-tunnel canary on PR CI. Brings up the simple-mesh bundle in per-node systemd-nspawn
  # containers and asserts the kernel overlay works (handshake/route/ping/SNAT). The additive
  # scenarios + negative proof are NOT part of the release gate (they are non-required / on-demand);
  # the 20x bake-in is the separate realtunnel-bakein workflow run as the rc.1 precondition.
  gate-realtunnel:
    name: Gate — Real-tunnel netns integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Prepare real-tunnel tier
        id: rt
        uses: ./.github/actions/realtunnel-setup
      - name: Real-tunnel canary (REQUIRED)
        run: |
          set -o pipefail
          sudo REALTUNNEL_ROOTFS=${{ steps.rt.outputs.rootfs }} ${{ steps.rt.outputs.testbin }} \
            -test.v -test.timeout 600s 2>&1 | tee /tmp/realtunnel-release.log
      - name: Upload realtunnel logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: realtunnel-release-logs
          path: /tmp/realtunnel-release.log
          retention-days: 7

  build-frontend:
    name: Build Frontend Dist
    needs: [gate-go, gate-frontend, gate-e2e, gate-realtunnel]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci --legacy-peer-deps
          # The all-in-one controller panel (default build → frontend/dist), shipped inside
          # every platform bundle + the controller image.
          npm run build
          # The static-local-design SPA (VITE_LOCAL_ONLY → frontend/dist-local, plan-7 / 1.7):
          # mode locked to local, controller affordances hidden, no backend dependency — packaged
          # as a SEPARATE standalone release asset (yaog-local-design-<version>.zip) below.
          npm run build:local

      - name: Upload Frontend Dist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

      - name: Upload Static-Local-Design Dist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-local
          path: frontend/dist-local
          if-no-files-found: error

  build-bundles:
    name: Build ${{ matrix.target.id }} Bundle
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: linux-amd64
            goos: linux
            goarch: amd64
            goarm: ''
            archive: tar.gz
            exe_ext: ''
          - id: linux-arm64
            goos: linux
            goarch: arm64
            goarm: ''
            archive: tar.gz
            exe_ext: ''
          - id: linux-386
            goos: linux
            goarch: 386
            goarm: ''
            archive: tar.gz
            exe_ext: ''
          - id: linux-armv7
            goos: linux
            goarch: arm
            goarm: '7'
            archive: tar.gz
            exe_ext: ''
          - id: windows-amd64
            goos: windows
            goarch: amd64
            goarm: ''
            archive: zip
            exe_ext: .exe
          - id: windows-arm64
            goos: windows
            goarch: arm64
            goarm: ''
            archive: zip
            exe_ext: .exe
          - id: windows-386
            goos: windows
            goarch: 386
            goarm: ''
            archive: zip
            exe_ext: .exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Download Frontend Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: .tmp/frontend-dist

      - name: Build Backend Binaries
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          GOARM: ${{ matrix.target.goarm }}
          CGO_ENABLED: 0
          # The release tag (e.g. v2.0.0-beta.1) injected via -X main.BuildVersion so each binary's
          # `version` subcommand + the agent's per-node report carry the real tag. Passed via env
          # (not inline ${{ }}) to keep the tag out of the shell-parse path.
          BUILD_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"

          if [ ! -f go.mod ]; then
            echo "go.mod not found in workspace root, searching for module root..."
            MOD_FILE="$(find . -maxdepth 4 -name go.mod | head -n1)"
            if [ -z "$MOD_FILE" ]; then
              echo "ERROR: go.mod not found in checkout" >&2
              ls -la
              exit 1
            fi
            cd "$(dirname "$MOD_FILE")"
          fi

          echo "Using module: $(go env GOMOD)"

          mkdir -p "$GITHUB_WORKSPACE/.tmp/bin"
          # EXTEND the existing "-s -w" ldflags with the build-version stamp; do not replace it.
          LDFLAGS="-s -w -X main.BuildVersion=${BUILD_VERSION}"
          # DEFAULT (controller-only) server — NO `-tags airgap` (plan-7 / 1.7): the four
          # anonymous air-gap compute routes are gated off this binary at link time. This is
          # the PRIMARY server artifact shipped in the bundle + the controller image.
          go build -trimpath -ldflags "$LDFLAGS" -o "$GITHUB_WORKSPACE/.tmp/bin/yaog-server${{ matrix.target.exe_ext }}" ./cmd/server
          go build -trimpath -ldflags "$LDFLAGS" -o "$GITHUB_WORKSPACE/.tmp/bin/yaog-compiler${{ matrix.target.exe_ext }}" ./cmd/compiler
          # yaog-agent is the node-side binary the one-shot bootstrap downloads (plan-5.2).
          go build -trimpath -ldflags "$LDFLAGS" -o "$GITHUB_WORKSPACE/.tmp/bin/yaog-agent${{ matrix.target.exe_ext }}" ./cmd/agent
          # `-tags airgap` server — the local-design ORACLE + the boot target for plan-13's
          # --mode airgap E2E and plan-21's DAST (plan-7 / 1.7). It RETAINS the four air-gap
          # compute routes; published as a SEPARATE standalone asset (yaog-server-airgap-*),
          # never the bundle's primary server, so it is opt-in for local/E2E use only.
          go build -trimpath -tags airgap -ldflags "$LDFLAGS" -o "$GITHUB_WORKSPACE/.tmp/bin/yaog-server-airgap${{ matrix.target.exe_ext }}" ./cmd/server

      - name: Assemble Bundle Directory
        run: |
          set -euo pipefail
          mkdir -p .tmp/bundle/bin .tmp/bundle/frontend
          # Ship the DEFAULT controller-only server + compiler + agent in the bundle. The
          # `-tags airgap` server (yaog-server-airgap*) is DELIBERATELY excluded — it is a
          # separate opt-in asset (staged below), never the bundle's primary server, so the
          # all-in-one bundle stays controller-only (plan-7 / 1.7).
          find .tmp/bin -maxdepth 1 -type f ! -name 'yaog-server-airgap*' -exec cp {} .tmp/bundle/bin/ \;
          cp -R .tmp/frontend-dist/. .tmp/bundle/frontend/

      - name: Create Bundle Archive
        run: |
          if [ "${{ matrix.target.archive }}" = "tar.gz" ]; then
            tar -czf "yaog-bundle-${{ matrix.target.id }}.tar.gz" -C .tmp/bundle .
          else
            (cd .tmp/bundle && zip -r "$GITHUB_WORKSPACE/yaog-bundle-${{ matrix.target.id }}.zip" .)
          fi

      - name: Upload Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaog-bundle-${{ matrix.target.id }}
          path: yaog-bundle-${{ matrix.target.id }}.${{ matrix.target.archive }}
          if-no-files-found: error

      # Publish the agent as a STANDALONE per-arch binary too, so the one-shot
      # bootstrap (plan-5.2) can download just the node binary (curl + chmod +x)
      # rather than the whole bundle.
      - name: Stage Standalone Agent Binary + SHA-256
        run: |
          set -euo pipefail
          AGENT="yaog-agent-${{ matrix.target.id }}${{ matrix.target.exe_ext }}"
          cp ".tmp/bin/yaog-agent${{ matrix.target.exe_ext }}" "$AGENT"
          # D9: emit a SHA-256 sidecar so beta.2's signed artifacts.json agent pin (AgentBinSHA256)
          # is populatable from the published release. NOTE: the agent ALWAYS verifies a self-update
          # against the SIGNED in-bundle artifacts.json pin, NEVER this sidecar (which rides the same
          # untrusted transport as the binary) — this file is an operator convenience for FILLING the
          # pin, not itself a trust anchor.
          sha256sum "$AGENT" | awk '{print $1}' > "$AGENT.sha256"

      - name: Upload Standalone Agent Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaog-agent-${{ matrix.target.id }}
          path: |
            yaog-agent-${{ matrix.target.id }}${{ matrix.target.exe_ext }}
            yaog-agent-${{ matrix.target.id }}${{ matrix.target.exe_ext }}.sha256
          if-no-files-found: error

      # Publish the `-tags airgap` server as a STANDALONE per-arch asset (plan-7 / 1.7): the
      # local-design oracle + plan-13/plan-21 boot target. It RE-EXPOSES the four air-gap compute
      # routes, so it is opt-in (NOT in the bundle, NOT the controller image) and clearly named.
      - name: Stage Standalone Air-Gap Server Binary
        run: |
          set -euo pipefail
          SRV="yaog-server-airgap-${{ matrix.target.id }}${{ matrix.target.exe_ext }}"
          cp ".tmp/bin/yaog-server-airgap${{ matrix.target.exe_ext }}" "$SRV"

      - name: Upload Standalone Air-Gap Server Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaog-server-airgap-${{ matrix.target.id }}
          path: yaog-server-airgap-${{ matrix.target.id }}${{ matrix.target.exe_ext }}
          if-no-files-found: error

  # Package the static-local-design SPA (VITE_LOCAL_ONLY build) into a single standalone,
  # backend-free archive operators can host on any static web server (plan-7 / 1.7). Separate
  # from the platform bundles: it has no binaries, no controller backend, one cross-platform zip.
  package-local-design:
    name: Package Static-Local-Design Site
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Download Static-Local-Design Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-local
          path: .tmp/dist-local

      - name: Create Static-Local-Design Archive
        run: |
          set -euo pipefail
          # github.ref_name is the tag (e.g. v2.0.0-beta.9). Name the asset by version so it is
          # self-describing alongside the platform bundles.
          (cd .tmp/dist-local && zip -r "$GITHUB_WORKSPACE/yaog-local-design-${{ github.ref_name }}.zip" .)

      - name: Upload Static-Local-Design Archive Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaog-local-design
          path: yaog-local-design-${{ github.ref_name }}.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-bundles, package-local-design]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Release Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: yaog-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            yaog-bundle-*.tar.gz
            yaog-bundle-*.zip
            yaog-agent-linux-*
            yaog-agent-windows-*
            yaog-server-airgap-*
            yaog-local-design-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}