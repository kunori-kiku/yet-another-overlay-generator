name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

# Serialize every tag's publication transaction. Two otherwise-valid tags must not race while
# moving the repository's mutable Latest pointers.
concurrency:
  group: yaog-release-publication
  cancel-in-progress: false

jobs:
  validate-release-ref:
    name: Validate release tag + current main tip
    runs-on: ubuntu-latest
    outputs:
      release_commit: ${{ steps.validate.outputs.release_commit }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Require an annotated YAOG release tag at the current main tip
        id: validate
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(preview|beta|rc)\.(0|[1-9][0-9]*))?$ ]]; then
            echo "::error::unsupported release tag: $RELEASE_TAG"
            exit 1
          fi
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          tag_commit="$(git rev-parse "$GITHUB_SHA^{commit}")"
          checkout_commit="$(git rev-parse 'HEAD^{commit}')"
          main_commit="$(git rev-parse 'origin/main^{commit}')"
          if [ "$checkout_commit" != "$tag_commit" ]; then
            echo "::error::checkout $checkout_commit does not equal tag event commit $tag_commit"
            exit 1
          fi
          if [ "$tag_commit" != "$main_commit" ]; then
            echo "::error::$RELEASE_TAG event commit $tag_commit is not current origin/main $main_commit"
            exit 1
          fi
          # checkout@v4 force-updates the triggering tag ref to github.sha after fetching
          # it. The shared verifier therefore reads the annotated object back from origin
          # through an isolated ref instead of trusting the checkout-created local tag.
          bash scripts/verify-release-ref.sh "$RELEASE_TAG" "$tag_commit"
          echo "release_commit=$tag_commit" >>"$GITHUB_OUTPUT"

  # Release gate: a tag must never ship untested code. The validator above restricts
  # it to the current main tip, and these jobs independently re-verify the protected-branch
  # contracts before any bundle is built. These seven jobs mirror ci.yml's required
  # Go, wire-drift, frontend, WASM, Playwright, real-tunnel, and security behaviors.
  # (setup-go here adds check-latest;
  # the resolved toolchain is identical — go.mod pins toolchain go1.26.5.)
  gate-go:
    name: Gate — Go vet + test
    needs: validate-release-ref
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true

      # Step-by-step mirror of ci.yml's `go` gate behavior (plan-22 / 4.3 Task 3): gofmt-drift +
      # vet + `go test -race`. Previously gate-go omitted gofmt + -race, so a tag could ship code
      # that would have failed PR CI.
      - name: Format check
        run: |
          drift="$(gofmt -l ./cmd ./internal)"
          if [ -n "$drift" ]; then
            echo "::error::gofmt drift — run 'gofmt -w ./cmd ./internal':"
            echo "$drift"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Generated PowerShell deploy contract
        run: |
          command -v pwsh
          go test ./internal/renderer -run 'TestRenderDeployScripts_PowerShell' -count=1

      - name: Per-package coverage floor
        run: go test ./internal/localcompile/ -run TestCoverageFloor -v
        env:
          YAOG_CONFORMANCE_COVERAGE_FLOOR: "1"

  gate-drift:
    name: Gate — Wire-DTO + omitempty drift
    needs: validate-release-ref
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Drift gate
        run: go test ./internal/wiredrift/ -v

  gate-frontend:
    name: Gate — Frontend lint + build + test
    needs: validate-release-ref
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      # Mirror ci.yml's `frontend` job (plan-22 / 4.3 Task 3): run the build (tsc -b, the stricter
      # project-references typecheck) HERE so a tsc-b failure reds the gate, not deep in build-frontend.
      - name: Build
        run: npm run build

      - name: Build WASM for the vitest roundtrip
        working-directory: ${{ github.workspace }}
        run: GOOS=js GOARCH=wasm go build -o web/yaog.wasm ./cmd/wasm

      - name: Unit + conformance tests (vitest)
        run: npm run vitest

  gate-wasm:
    name: Gate — WASM conformance
    needs: validate-release-ref
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Build yaog.wasm
        run: GOOS=js GOARCH=wasm go build -o web/yaog.wasm ./cmd/wasm
      - name: WASM-vs-golden three-way gate
        run: node scripts/wasm-conformance-gate.mjs

  gate-security:
    name: Gate — Security
    needs: validate-release-ref
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
      - name: govulncheck (REQUIRED)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          "$(go env GOPATH)/bin/govulncheck" ./...
      - name: DAST — live-wire exploit replay (REQUIRED)
        run: go test -tags dast ./internal/dast/ -v -timeout 180s

  # Mirror ci.yml's required frontend-e2e job: a tag must not ship a panel that would have
  # failed the full-stack Playwright suite on PR CI (tests_ci.recommendations[2]).
  gate-e2e:
    name: Gate — Frontend E2E (Playwright)
    needs: validate-release-ref
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build E2E bring-up binaries
        run: |
          mkdir -p .e2e-bin
          go build -o .e2e-bin/e2eserver ./cmd/e2eserver
          go build -o .e2e-bin/e2eagent ./cmd/e2eagent
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      # Build the in-browser Go/WASM engine BEFORE the panel build — MUST mirror ci.yml's frontend-e2e
      # job exactly (the release E2E gate's contract is "build the panel the same way CI does"). WASM is
      # the default local engine; build:wasm compiles web/yaog.wasm + refreshes wasm_exec.js from the
      # release toolchain and copies BOTH into frontend/public/, so the `vite build` below stamps them
      # into dist/. Without this step /yaog.wasm 404s and every in-browser-validate spec (wasm-design,
      # controller-fleet Validate, link-direction Validate) times out — which is exactly what a tag push
      # surfaced when this step was missing here but present in ci.yml. Go is set up above.
      - name: Build WASM for the e2e panel
        working-directory: frontend
        run: npm run build:wasm
      # VITE_E2E=1 (matching ci.yml's frontend-e2e Build panel) compiles in the test-only
      # ErrorBoundary render-throw probe (App.tsx, gated on import.meta.env.VITE_E2E, else DCE'd).
      # The REQUIRED adversarial spec e2e/adversarial/error-render.spec.ts drives it, so without this
      # flag that spec deterministically times out — the gate must build the panel the same way CI does.
      - name: Build panel
        working-directory: frontend
        run: VITE_E2E=1 npm run build
      # Mirror ci.yml's per-PR ship assertion: the panel build must stamp the WASM engine into dist/ so
      # the boots serve /yaog.wasm as a real static file (the in-browser engine instantiates from it).
      - name: Assert WASM engine shipped in dist
        working-directory: frontend
        run: test -f dist/yaog.wasm && test -f dist/wasm_exec.js
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      # Mirror ci.yml's REQUIRED frontend-e2e step exactly: the functional/adversarial suite + the
      # deterministic responsive BEHAVIOR matrix, EXCLUDING the pixel "visual corpus". The visual
      # snapshots are a deliberately NON-blocking, not-yet-CI-stable gate (ci.yml runs them as a
      # separate continue-on-error step; e2e/README.md §visual-regression). Gating a release tag on
      # them would block on a check the project does not treat as required, so this step must use the
      # same --grep-invert as the required CI step, not the full `npm run test:e2e`.
      - name: Run E2E suite (required set — excludes the non-blocking visual corpus)
        working-directory: frontend
        run: npm run test:e2e -- --grep-invert "visual corpus"
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  # Mirror ci.yml's `realtunnel` job: a tag must not ship code that would have failed the rc.1-gating
  # real-tunnel canary on PR CI. Brings up the simple-mesh bundle in per-node systemd-nspawn
  # containers and asserts the kernel overlay works (handshake/route/ping/SNAT). The additive
  # scenarios + negative proof are NOT part of the release gate (they are non-required / on-demand);
  # the 20x bake-in is the separate realtunnel-bakein workflow run as the rc.1 precondition.
  gate-realtunnel:
    name: Gate — Real-tunnel netns integration
    needs: validate-release-ref
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Prepare real-tunnel tier
        id: rt
        uses: ./.github/actions/realtunnel-setup
      - name: Real-tunnel canary (REQUIRED)
        run: |
          set -o pipefail
          sudo REALTUNNEL_ROOTFS=${{ steps.rt.outputs.rootfs }} ${{ steps.rt.outputs.testbin }} \
            -test.v -test.timeout 600s 2>&1 | tee /tmp/realtunnel-release.log
          # Positive run-assertion: a skipped canary exits 0, which must not let the release gate pass
          # vacuously — require the canary to have actually PASSED, and fail loud if it SKIPPED.
          grep -q '^--- PASS: TestSimpleMeshCanary' /tmp/realtunnel-release.log \
            || { echo "::error::TestSimpleMeshCanary did not PASS (skipped or absent) — release gate must not pass vacuously"; exit 1; }
          ! grep -q '^--- SKIP: TestSimpleMeshCanary' /tmp/realtunnel-release.log \
            || { echo "::error::TestSimpleMeshCanary SKIPPED — a prerequisite is missing on the runner"; exit 1; }
      - name: Upload realtunnel logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: realtunnel-release-logs
          path: /tmp/realtunnel-release.log
          retention-days: 7

  build-frontend:
    name: Build Frontend Dist
    needs: [gate-go, gate-drift, gate-frontend, gate-wasm, gate-e2e, gate-realtunnel, gate-security]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Go is REQUIRED here: the in-browser local engine (framework-refactor plan-4 made Go/WASM the
      # default+only local engine) is compiled by npm run build:wasm below. Resolve the go.mod toolchain
      # (go1.26.5) via check-latest; do NOT pin GOTOOLCHAIN=local (that could ship a wasm built by an
      # older toolchain against the committed 1.26.5 web/wasm_exec.js).
      - name: Setup Go (WASM local engine)
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci --legacy-peer-deps
          # The in-browser Go/WASM local engine: build:wasm compiles web/yaog.wasm + refreshes
          # web/wasm_exec.js from the toolchain and copies BOTH into frontend/public/, so the vite
          # builds below stamp them into dist/ + dist-local/. Without this, every shipped panel 404s
          # on /yaog.wasm and in-browser local design is dead-on-arrival (CI's e2e job builds the wasm
          # separately, so the gap was invisible until now).
          npm run build:wasm
          # The all-in-one controller panel (default build → frontend/dist), shipped inside
          # every platform bundle + the controller image.
          npm run build
          # The static-local-design SPA (VITE_LOCAL_ONLY → frontend/dist-local, plan-7 / 1.7):
          # mode locked to local, controller affordances hidden, no backend dependency — packaged
          # as a SEPARATE standalone release asset (yaog-local-design-<version>.zip) below.
          npm run build:local
          # SHIP GATE (plan-2): a build-frontend regression that drops the WASM engine must FAIL the
          # release here, not 404 at runtime on the fleet. BOTH shipped panels must carry it.
          test -f dist/yaog.wasm && test -f dist/wasm_exec.js
          test -f dist-local/yaog.wasm && test -f dist-local/wasm_exec.js

      - name: Upload Frontend Dist Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

      - name: Upload Static-Local-Design Dist Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-dist-local
          path: frontend/dist-local
          if-no-files-found: error

  build-bundles:
    name: Build ${{ matrix.target.id }} Bundle
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: linux-amd64
            goos: linux
            goarch: amd64
            goarm: ''
            archive: tar.gz
            exe_ext: ''
          - id: linux-arm64
            goos: linux
            goarch: arm64
            goarm: ''
            archive: tar.gz
            exe_ext: ''
          - id: linux-386
            goos: linux
            goarch: 386
            goarm: ''
            archive: tar.gz
            exe_ext: ''
          - id: linux-armv7
            goos: linux
            goarch: arm
            goarm: '7'
            archive: tar.gz
            exe_ext: ''
          - id: windows-amd64
            goos: windows
            goarch: amd64
            goarm: ''
            archive: zip
            exe_ext: .exe
          - id: windows-arm64
            goos: windows
            goarch: arm64
            goarm: ''
            archive: zip
            exe_ext: .exe
          - id: windows-386
            goos: windows
            goarch: 386
            goarm: ''
            archive: zip
            exe_ext: .exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Download Frontend Dist Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: frontend-dist
          path: .tmp/frontend-dist

      - name: Build Backend Binaries
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          GOARM: ${{ matrix.target.goarm }}
          CGO_ENABLED: 0
          # The release tag (e.g. v2.0.0-beta.1) injected via -X main.BuildVersion so each binary's
          # `version` subcommand + the agent's per-node report carry the real tag. Passed via env
          # (not inline ${{ }}) to keep the tag out of the shell-parse path.
          BUILD_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"

          # Downloaded frontend inputs live under .tmp. Ignore that job-local directory in
          # Git's private exclude file so Go's VCS build info records the clean tagged tree,
          # then prove no tracked or other untracked input can set vcs.modified=true.
          printf '/.tmp/\n' >>.git/info/exclude
          if [ -n "$(git status --porcelain --untracked-files=all)" ]; then
            echo "::error::release build worktree is modified"
            git status --short
            exit 1
          fi

          if [ ! -f go.mod ]; then
            echo "go.mod not found in workspace root, searching for module root..."
            MOD_FILE="$(find . -maxdepth 4 -name go.mod | head -n1)"
            if [ -z "$MOD_FILE" ]; then
              echo "ERROR: go.mod not found in checkout" >&2
              ls -la
              exit 1
            fi
            cd "$(dirname "$MOD_FILE")"
          fi

          echo "Using module: $(go env GOMOD)"

          mkdir -p "$GITHUB_WORKSPACE/.tmp/bin"
          # EXTEND the existing "-s -w" ldflags with the build-version stamp; do not replace it.
          LDFLAGS="-s -w -X main.BuildVersion=${BUILD_VERSION}"
          # The controller server — the single server build (framework-refactor plan-9 retired
          # the -tags airgap variant). It is the PRIMARY server artifact shipped in the bundle +
          # the controller image; it links no anonymous compute routes.
          go build -trimpath -ldflags "$LDFLAGS" -o "$GITHUB_WORKSPACE/.tmp/bin/yaog-server${{ matrix.target.exe_ext }}" ./cmd/server
          go build -trimpath -ldflags "$LDFLAGS" -o "$GITHUB_WORKSPACE/.tmp/bin/yaog-compiler${{ matrix.target.exe_ext }}" ./cmd/compiler
          # yaog-agent is the node-side binary the one-shot bootstrap downloads (plan-5.2).
          go build -trimpath -ldflags "$LDFLAGS" -o "$GITHUB_WORKSPACE/.tmp/bin/yaog-agent${{ matrix.target.exe_ext }}" ./cmd/agent

      - name: Assemble Bundle Directory
        run: |
          set -euo pipefail
          mkdir -p .tmp/bundle/bin .tmp/bundle/frontend
          # Ship the controller server + compiler + agent in the bundle.
          find .tmp/bin -maxdepth 1 -type f -exec cp {} .tmp/bundle/bin/ \;
          cp -R .tmp/frontend-dist/. .tmp/bundle/frontend/

      - name: Create Bundle Archive
        run: |
          if [ "${{ matrix.target.archive }}" = "tar.gz" ]; then
            tar -czf "yaog-bundle-${{ matrix.target.id }}.tar.gz" -C .tmp/bundle bin frontend
          else
            (cd .tmp/bundle && zip -r "$GITHUB_WORKSPACE/yaog-bundle-${{ matrix.target.id }}.zip" bin frontend)
          fi

      - name: Upload Bundle Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: yaog-bundle-${{ matrix.target.id }}
          path: yaog-bundle-${{ matrix.target.id }}.${{ matrix.target.archive }}
          if-no-files-found: error

      # Publish the agent as a STANDALONE per-arch binary too, so the one-shot
      # bootstrap (plan-5.2) can download just the node binary (curl + chmod +x)
      # rather than the whole bundle.
      - name: Stage Standalone Agent Binary + SHA-256
        run: |
          set -euo pipefail
          AGENT="yaog-agent-${{ matrix.target.id }}${{ matrix.target.exe_ext }}"
          cp ".tmp/bin/yaog-agent${{ matrix.target.exe_ext }}" "$AGENT"
          # D9: emit a SHA-256 sidecar so beta.2's signed artifacts.json agent pin (AgentBinSHA256)
          # is populatable from the published release. NOTE: the agent ALWAYS verifies a self-update
          # against the SIGNED in-bundle artifacts.json pin, NEVER this sidecar (which rides the same
          # untrusted transport as the binary) — this file is an operator convenience for FILLING the
          # pin, not itself a trust anchor.
          sha256sum "$AGENT" | awk '{print $1}' > "$AGENT.sha256"

      - name: Upload Standalone Agent Binary Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: yaog-agent-${{ matrix.target.id }}
          path: |
            yaog-agent-${{ matrix.target.id }}${{ matrix.target.exe_ext }}
            yaog-agent-${{ matrix.target.id }}${{ matrix.target.exe_ext }}.sha256
          if-no-files-found: error

  # Package the static-local-design SPA (VITE_LOCAL_ONLY build) into a single standalone,
  # backend-free archive operators can host on any static web server (plan-7 / 1.7). Separate
  # from the platform bundles: it has no binaries, no controller backend, one cross-platform zip.
  package-local-design:
    name: Package Static-Local-Design Site
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Download Static-Local-Design Dist Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: frontend-dist-local
          path: .tmp/dist-local

      - name: Create Static-Local-Design Archive
        run: |
          set -euo pipefail
          # github.ref_name is the tag (e.g. v2.0.0-beta.9). Name the asset by version so it is
          # self-describing alongside the platform bundles.
          (cd .tmp/dist-local && zip -r "$GITHUB_WORKSPACE/yaog-local-design-${{ github.ref_name }}.zip" ./*)

      - name: Upload Static-Local-Design Archive Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: yaog-local-design
          path: yaog-local-design-${{ github.ref_name }}.zip
          if-no-files-found: error

  verify-release-assets:
    name: Verify exact 22-file release set
    needs: [validate-release-ref, build-bundles, package-local-design]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout verification scripts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go for structural and build-metadata verification
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Download all release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: yaog-*
          merge-multiple: true
          path: release-assets

      - name: Run focused adversarial verifier tests
        run: go test ./scripts

      - name: Verify allowlist, safe archives, every binary target, and WASM
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          SOURCE_REVISION: ${{ needs.validate-release-ref.outputs.release_commit }}
        run: bash scripts/verify-release-assets.sh release-assets "$RELEASE_TAG" "$SOURCE_REVISION"

  verify-release-windows:
    name: Verify native Windows amd64 + 386 release versions
    needs: verify-release-assets
    runs-on: windows-latest
    steps:
      - name: Checkout verification scripts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download native Windows release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: yaog-*-windows-*
          merge-multiple: true
          path: release-assets

      - name: Run native Windows version checks
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: ./scripts/verify-release-windows-amd64.ps1 -AssetDirectory release-assets -ReleaseTag $env:RELEASE_TAG

  preflight-release-object:
    name: Refuse public or misclassified release reuse
    needs: [validate-release-ref, verify-release-windows]
    runs-on: ubuntu-latest
    permissions:
      # GitHub exposes draft releases only to a token with push-level repository access.
      contents: write
    steps:
      - name: Checkout release-state verifier
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Require an absent or exactly classified draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          EXPECTED_PRERELEASE: ${{ contains(github.ref_name, '-preview.') || contains(github.ref_name, '-beta.') }}
        run: bash scripts/verify-github-release.sh preflight-state "$GITHUB_REPOSITORY" "$RELEASE_TAG" "$EXPECTED_PRERELEASE"

  # Publish and inspect the policy-non-overwritten container version before a public release exists.
  # docker.yml deliberately does not move a mutable tag in this phase.
  publish-versioned-container:
    name: Publish verified versioned controller image
    needs: [validate-release-ref, verify-release-assets, verify-release-windows, preflight-release-object]
    uses: ./.github/workflows/docker.yml
    permissions:
      contents: read
      packages: write
    with:
      version: ${{ github.ref_name }}
      source_revision: ${{ needs.validate-release-ref.outputs.release_commit }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  release:
    name: Upload verified GitHub Release draft
    needs: [validate-release-ref, publish-versioned-container]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.select-draft.outputs.release_id }}
    steps:
      - name: Checkout verification scripts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Go for publish-input verification
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Download all release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: yaog-*
          merge-multiple: true
          path: release-assets

      # Re-check the bytes downloaded on this runner so the create step cannot accidentally upload
      # a different glob result from the artifact set approved by verify-release-assets.
      - name: Re-verify publish input
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          SOURCE_REVISION: ${{ needs.validate-release-ref.outputs.release_commit }}
        run: |
          bash scripts/verify-release-assets.sh release-assets "$RELEASE_TAG" "$SOURCE_REVISION"
          bash scripts/verify-release-ref.sh "$RELEASE_TAG" "$SOURCE_REVISION"

      - name: Preflight absent or same-byte recovery draft
        id: preflight-draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          EXPECTED_PRERELEASE: ${{ contains(github.ref_name, '-preview.') || contains(github.ref_name, '-beta.') }}
        run: |
          set -euo pipefail
          bash scripts/verify-github-release.sh preflight-upload \
            "$GITHUB_REPOSITORY" "$RELEASE_TAG" "$EXPECTED_PRERELEASE" release-assets \
            | tee /tmp/yaog-release-preflight.outputs
          cat /tmp/yaog-release-preflight.outputs >>"$GITHUB_OUTPUT"

      - name: Select one exact private draft
        id: select-draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          EXPECTED_PRERELEASE: ${{ contains(github.ref_name, '-preview.') || contains(github.ref_name, '-beta.') }}
          PREFLIGHT_STATUS: ${{ steps.preflight-draft.outputs.release_status }}
          PREFLIGHT_ID: ${{ steps.preflight-draft.outputs.release_id }}
        run: |
          set -euo pipefail
          if [ "$PREFLIGHT_STATUS" = absent ]; then
            gh api --method POST "repos/$GITHUB_REPOSITORY/releases" \
              -f tag_name="$RELEASE_TAG" \
              -F draft=true \
              -F prerelease="$EXPECTED_PRERELEASE" \
              -f make_latest=false > /tmp/yaog-created-draft.json
            release_id=$(jq -er --arg tag "$RELEASE_TAG" --argjson prerelease "$EXPECTED_PRERELEASE" '
              select(.tag_name == $tag and .draft == true and .prerelease == $prerelease)
              | .id | select(type == "number")
            ' /tmp/yaog-created-draft.json)
          elif [ "$PREFLIGHT_STATUS" = draft ] && [[ "$PREFLIGHT_ID" =~ ^[0-9]+$ ]]; then
            release_id=$PREFLIGHT_ID
          else
            echo "::error::invalid draft preflight result"
            exit 1
          fi
          echo "release_id=$release_id" >>"$GITHUB_OUTPUT"

      - name: Upload the exact allowlist to the selected draft
        id: create-release
        # softprops/action-gh-release v3.0.2. Pin the reviewed commit rather than a mutable tag.
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          working_directory: release-assets
          # Preview/beta are GitHub prereleases. Project policy treats RC/GA as normal releases, but
          # every release remains a private draft until its final transaction job succeeds.
          draft: true
          prerelease: ${{ contains(github.ref_name, '-preview.') || contains(github.ref_name, '-beta.') }}
          make_latest: false
          fail_on_unmatched_files: true
          overwrite_files: false
          files: |
            yaog-bundle-linux-amd64.tar.gz
            yaog-bundle-linux-arm64.tar.gz
            yaog-bundle-linux-386.tar.gz
            yaog-bundle-linux-armv7.tar.gz
            yaog-bundle-windows-amd64.zip
            yaog-bundle-windows-arm64.zip
            yaog-bundle-windows-386.zip
            yaog-agent-linux-amd64
            yaog-agent-linux-amd64.sha256
            yaog-agent-linux-arm64
            yaog-agent-linux-arm64.sha256
            yaog-agent-linux-386
            yaog-agent-linux-386.sha256
            yaog-agent-linux-armv7
            yaog-agent-linux-armv7.sha256
            yaog-agent-windows-amd64.exe
            yaog-agent-windows-amd64.exe.sha256
            yaog-agent-windows-arm64.exe
            yaog-agent-windows-arm64.exe.sha256
            yaog-agent-windows-386.exe
            yaog-agent-windows-386.exe.sha256
            yaog-local-design-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Seal uploaded draft metadata, names, sizes, and digests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTION_RELEASE_ID: ${{ steps.create-release.outputs.id }}
          RELEASE_ID: ${{ steps.select-draft.outputs.release_id }}
          RELEASE_TAG: ${{ github.ref_name }}
          EXPECTED_PRERELEASE: ${{ contains(github.ref_name, '-preview.') || contains(github.ref_name, '-beta.') }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_ID" =~ ^[0-9]+$ ]] && [ "$ACTION_RELEASE_ID" = "$RELEASE_ID" ] \
            || { echo "::error::release action selected $ACTION_RELEASE_ID, expected private draft $RELEASE_ID"; exit 1; }
          bash scripts/verify-github-release.sh verify \
            "$GITHUB_REPOSITORY" "$RELEASE_ID" "$RELEASE_TAG" true \
            "$EXPECTED_PRERELEASE" release-assets ignore

  # Preview/beta have no mutable image promotion. Publishing their verified draft is therefore the
  # final transaction step; the typed API fields prevent an accidental normal/Latest release.
  publish-prerelease:
    name: Publish verified preview/beta draft
    needs: [validate-release-ref, release]
    if: ${{ contains(github.ref_name, '-beta.') || contains(github.ref_name, '-preview.') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_ID: ${{ needs.release.outputs.release_id }}
      RELEASE_TAG: ${{ github.ref_name }}
      SOURCE_REVISION: ${{ needs.validate-release-ref.outputs.release_commit }}
    steps:
      - name: Checkout release verifiers
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Go for final publish-input verification
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Download exact release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: yaog-*
          merge-multiple: true
          path: release-assets

      - name: Re-seal and idempotently publish as a non-Latest prerelease
        run: |
          set -euo pipefail
          [[ "$RELEASE_ID" =~ ^[0-9]+$ ]] \
            || { echo "::error::release action did not return a valid release id"; exit 1; }
          bash scripts/verify-release-assets.sh release-assets "$RELEASE_TAG" "$SOURCE_REVISION"
          bash scripts/verify-release-ref.sh "$RELEASE_TAG" "$SOURCE_REVISION"
          bash scripts/verify-github-release.sh publish \
            "$GITHUB_REPOSITORY" "$RELEASE_ID" "$RELEASE_TAG" true release-assets must-not

  # RC and GA converge optional Docker Hub, GHCR, and GitHub Latest to the same verified transaction.
  # Those systems cannot update atomically, so every operation is retryable/idempotent and the job's
  # final checks cover every configured pointer. Preview/beta skip mutable container promotion.
  promote-latest:
    name: Promote verified digest + GitHub Latest
    needs: [validate-release-ref, publish-versioned-container, release]
    if: ${{ !contains(github.ref_name, '-beta.') && !contains(github.ref_name, '-preview.') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GHCR_REF: ${{ needs.publish-versioned-container.outputs.ghcr_ref }}
      DOCKERHUB_ENABLED: ${{ needs.publish-versioned-container.outputs.dockerhub_enabled }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      IMAGE_DIGEST: ${{ needs.publish-versioned-container.outputs.ghcr_digest }}
      RELEASE_ID: ${{ needs.release.outputs.release_id }}
      RELEASE_TAG: ${{ github.ref_name }}
      SOURCE_REVISION: ${{ needs.validate-release-ref.outputs.release_commit }}
    steps:
      - name: Checkout release verifiers
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Go for final publish-input verification
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Download exact release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: yaog-*
          merge-multiple: true
          path: release-assets

      - name: Set up QEMU for two-platform runtime verification
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Buildx manifest tooling
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub when configured
        if: ${{ env.DOCKERHUB_ENABLED == 'true' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verify final local input and release identity
        run: |
          set -euo pipefail
          bash scripts/verify-release-assets.sh release-assets "$RELEASE_TAG" "$SOURCE_REVISION"
          bash scripts/verify-release-ref.sh "$RELEASE_TAG" "$SOURCE_REVISION"

      - name: Idempotently converge mutable container tags by verified digest
        shell: bash
        run: |
          set -euo pipefail
          [[ "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]] \
            || { echo "::error::invalid versioned image digest"; exit 1; }

          promote_ref() {
            local version_ref=$1
            local label=$2
            local latest_ref=${version_ref%:*}:latest
            local verified
            verified=$(bash scripts/verify-controller-image.sh \
              "$version_ref" "$RELEASE_TAG" "$SOURCE_REVISION" "$IMAGE_DIGEST")
            [ "$verified" = "$IMAGE_DIGEST" ] \
              || { echo "::error::$label version reference failed verification"; exit 1; }

            local attempt
            for attempt in 1 2 3 4 5; do
              if docker buildx imagetools create --tag "$latest_ref" "$version_ref@$IMAGE_DIGEST"; then
                if verified=$(bash scripts/verify-controller-image.sh \
                  "$latest_ref" "$RELEASE_TAG" "$SOURCE_REVISION" "$IMAGE_DIGEST"); then
                  [ "$verified" = "$IMAGE_DIGEST" ] && return 0
                fi
              fi
              (( attempt == 5 )) || sleep $((attempt * 2))
            done
            echo "::error::could not converge $latest_ref to $IMAGE_DIGEST"
            return 1
          }

          # Docker Hub is optional and is touched only when docker.yml verified the same version.
          # Reconstruct its ref locally instead
          # of exporting a secret-derived username through reusable-workflow outputs.
          if [ "$DOCKERHUB_ENABLED" = true ]; then
            [[ "$DOCKERHUB_USERNAME" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]] \
              || { echo "::error::invalid configured Docker Hub username"; exit 1; }
            dockerhub_ref="$DOCKERHUB_USERNAME/yaog-controller:${RELEASE_TAG#v}"
            promote_ref "$dockerhub_ref" dockerhub
          elif [ "$DOCKERHUB_ENABLED" != false ]; then
            echo "::error::invalid Docker Hub publication state"
            exit 1
          fi
          promote_ref "$GHCR_REF" ghcr

      - name: Re-seal and idempotently publish the release as GitHub Latest
        run: |
          set -euo pipefail
          [[ "$RELEASE_ID" =~ ^[0-9]+$ ]] \
            || { echo "::error::release action did not return a valid release id"; exit 1; }
          bash scripts/verify-release-ref.sh "$RELEASE_TAG" "$SOURCE_REVISION"
          # This helper always seals exact metadata and all 22 remote sizes/digests
          # before changing state. If a previous PATCH made the release public but
          # did not leave it as Latest, a retry converges that pointer as well.
          bash scripts/verify-github-release.sh publish \
            "$GITHUB_REPOSITORY" "$RELEASE_ID" "$RELEASE_TAG" false release-assets must

      - name: Verify all configured public pointers converged
        shell: bash
        run: |
          set -euo pipefail
          ghcr_latest=${GHCR_REF%:*}:latest
          [ "$(bash scripts/verify-controller-image.sh \
            "$ghcr_latest" "$RELEASE_TAG" "$SOURCE_REVISION" "$IMAGE_DIGEST")" = "$IMAGE_DIGEST" ]
          if [ "$DOCKERHUB_ENABLED" = true ]; then
            dockerhub_latest="$DOCKERHUB_USERNAME/yaog-controller:latest"
            [ "$(bash scripts/verify-controller-image.sh \
              "$dockerhub_latest" "$RELEASE_TAG" "$SOURCE_REVISION" "$IMAGE_DIGEST")" = "$IMAGE_DIGEST" ]
          elif [ "$DOCKERHUB_ENABLED" != false ]; then
            echo "::error::invalid Docker Hub publication state"
            exit 1
          fi
          bash scripts/verify-github-release.sh verify \
            "$GITHUB_REPOSITORY" "$RELEASE_ID" "$RELEASE_TAG" false false release-assets must
