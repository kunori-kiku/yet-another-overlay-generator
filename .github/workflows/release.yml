name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
          
      - name: Tar Frontend Dist
        run: |
          tar -czvf frontend-dist.tar.gz -C frontend/dist/ .

      - name: Build Backend (Linux AMD64)
        run: |
          GOOS=linux GOARCH=amd64 go build -o yaog-server-linux-amd64 ./cmd/server
          GOOS=linux GOARCH=amd64 go build -o yaog-compiler-linux-amd64 ./cmd/compiler

      - name: Build Backend (Linux ARM64)
        run: |
          GOOS=linux GOARCH=arm64 go build -o yaog-server-linux-arm64 ./cmd/server
          GOOS=linux GOARCH=arm64 go build -o yaog-compiler-linux-arm64 ./cmd/compiler

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend-dist.tar.gz
            yaog-server-linux-amd64
            yaog-compiler-linux-amd64
            yaog-server-linux-arm64
            yaog-compiler-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}