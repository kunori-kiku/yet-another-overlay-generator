# YAOG controller — one-command deploy.
#
# State persists to ./data NEXT TO this file (a bind mount), so backing up the
# controller is just copying that folder. The container runs as uid 65532, so create
# the folder with that owner ONCE before the first `up`:
#
#   mkdir -p data && sudo chown 65532:65532 data
#   docker compose up -d
#
# Then create the first operator account (interactive password prompt):
#
#   docker compose run --rm controller create-operator \
#       --state-dir /data --tenant "${YAOG_TENANT_ID:-default}" --username admin
#
# The panel + operator API are on :8080, the agent API on :9090. Both are published to
# the LOOPBACK interface only by default (127.0.0.1) — reach the panel via a reverse proxy
# (recommended) or an SSH tunnel. To expose them on other interfaces (e.g. for remote agents
# pulling without a proxy), set YAOG_BIND_ADDR (e.g. `YAOG_BIND_ADDR=0.0.0.0 docker compose up -d`).
# Front it with a TLS-terminating reverse proxy in production (see the commented `caddy` service /
# docs/spec/controller/docker.md) — POST /login carries a plaintext password.

services:
  controller:
    image: ghcr.io/kunori-kiku/yaog-controller:latest
    # To build locally instead of pulling, comment `image:` and uncomment:
    # build: .
    restart: unless-stopped
    environment:
      # Turning on controller mode requires BOTH a state dir and a tenant id.
      YAOG_TENANT_ID: "${YAOG_TENANT_ID:-default}"
      YAOG_CONTROLLER_STATE_DIR: /data
      YAOG_WEB_DIR: /app/web
      # Optional break-glass operator token (recovery). Prefer `create-operator`.
      # Unset (the `:-` default) = no break-glass token; set it in .env to enable.
      YAOG_CONTROLLER_OPERATOR_TOKEN: "${YAOG_CONTROLLER_OPERATOR_TOKEN:-}"
      # Optional secret path prefixes (defense-in-depth obscurity), one per audience:
      # the operator/panel API (:8080) and the agent API (:9090) mount independently,
      # so a path-based proxy rule per audience works on a single hostname. Passed through
      # ALWAYS: the `:-` default is empty (= no prefix, identical to leaving it unset), so
      # these stay declared here and simply pick up whatever you set in .env — a commented
      # line would silently drop a .env prefix because compose only injects vars named here.
      YAOG_OPERATOR_PATH_PREFIX: "${YAOG_OPERATOR_PATH_PREFIX:-}"
      YAOG_AGENT_PATH_PREFIX: "${YAOG_AGENT_PATH_PREFIX:-}"
    ports:
      # Loopback-only by DEFAULT (secure): the panel's POST /login carries a plaintext password
      # and the agent API authorizes nodes, so neither port is published on public interfaces out
      # of the box. Override the host bind address with YAOG_BIND_ADDR to expose them directly —
      # e.g. `YAOG_BIND_ADDR=0.0.0.0 docker compose up -d` — but prefer fronting with the reverse
      # proxy (the proxy reaches the controller over the compose network, no host port needed).
      - "${YAOG_BIND_ADDR:-127.0.0.1}:8080:8080" # operator / panel
      - "${YAOG_BIND_ADDR:-127.0.0.1}:9090:9090" # agent
    volumes:
      # Bind-mount the FileStore state to ./data alongside this file (easy to back up /
      # snapshot). See the header note for the one-time `chown 65532:65532 data`.
      - ./data:/data

  # Optional TLS-terminating reverse proxy. Uncomment, add a Caddyfile next to this
  # file, and point your domain at it. Caddy fetches/renews Let's Encrypt certs.
  # caddy:
  #   image: caddy:2-alpine
  #   restart: unless-stopped
  #   depends_on: [controller]
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - ./caddy-data:/data
  #     - ./caddy-config:/config
